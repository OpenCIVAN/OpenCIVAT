version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cia-postgres
    environment:
      POSTGRES_DB: cia_analytics
      POSTGRES_USER: cia_admin
      POSTGRES_PASSWORD: cia_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cia_admin -d cia_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cia-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9002:9001"  # Console (changed from 9001 to avoid conflict with WebSocket)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: cia-api
    environment:
      NODE_ENV: development
      PORT: 3001
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cia_analytics
      DB_USER: cia_admin
      DB_PASSWORD: cia_password
      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: cia-files
      MINIO_USE_SSL: false
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - /app/node_modules

volumes:
  postgres_data:
  minio_data: