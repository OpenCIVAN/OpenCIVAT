<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Component Viewer</title>
  
  <!-- React and ReactDOM from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel for JSX transformation in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide React icons -->
  <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- 
    HOW TO USE:
    ===========
    1. Save this HTML file somewhere on your computer
    2. Copy the ENTIRE contents of your .jsx file
    3. Paste it below, REPLACING the example component
    4. Open this HTML file in your browser (Chrome, Firefox, Edge, etc.)
    
    IMPORTANT: 
    - Remove the "import" lines from your JSX (the CDN scripts handle that)
    - The component must be named "App" OR you need to change the render line at the bottom
    
    For the files I created, you'll need to:
    1. Remove the first line: import React, { useState } from 'react';
    2. Remove the lucide-react import line
    3. Change "export default function ComponentName" to just "function App"
  -->
  
  <script type="text/babel">
    // Destructure what we need from the CDN-loaded libraries
    const { useState } = React;
    const { 
      ChevronRight, ChevronDown, Eye, EyeOff, Filter, Layers, GitCompare, 
      Lock, Unlock, Users, User, Database, Settings, Monitor, Plus, Minus, 
      Link, Unlink, Copy, Trash2, Edit3, Share2, FolderPlus, Check, X, 
      ArrowRight, Zap, Grid, Layout, Maximize2, Box, Clock, RefreshCw, 
      Camera, Play, Pause, ArrowDown, ArrowUp, Home, Folder, FileText, 
      LayoutGrid, Crosshair, Move, SplitSquareHorizontal, AlertCircle, 
      CheckCircle, XCircle, Archive, Download, Upload, Glasses, UserCheck, 
      Navigation, Compass, Radio, Volume2, VolumeX
    } = lucideReact;
    
    // Alias for Eye icon (used as EyeIcon in some components)
    const EyeIcon = Eye;

    // =====================================================
    // PASTE YOUR COMPONENT CODE BELOW THIS LINE
    // (Remove import statements and change export default to just function App)
    // =====================================================
    
    function App() {
      const [count, setCount] = useState(0);
      
      return (
        <div style={{ 
          minHeight: '100vh', 
          background: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)',
          color: '#e8e8e8',
          fontFamily: 'system-ui, -apple-system, sans-serif',
          padding: '40px',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          justifyContent: 'center'
        }}>
          <h1 style={{ marginBottom: '20px' }}>React Component Viewer</h1>
          <p style={{ marginBottom: '20px', color: '#a0a0a0' }}>
            This is a placeholder. Replace this component with your JSX code!
          </p>
          <div style={{ 
            display: 'flex', 
            alignItems: 'center', 
            gap: '16px',
            padding: '20px',
            background: 'rgba(255,255,255,0.1)',
            borderRadius: '12px'
          }}>
            <button 
              onClick={() => setCount(c => c - 1)}
              style={{
                padding: '10px 20px',
                borderRadius: '8px',
                border: 'none',
                background: '#ef5350',
                color: 'white',
                cursor: 'pointer',
                fontSize: '18px'
              }}
            >
              -
            </button>
            <span style={{ fontSize: '24px', minWidth: '60px', textAlign: 'center' }}>
              {count}
            </span>
            <button 
              onClick={() => setCount(c => c + 1)}
              style={{
                padding: '10px 20px',
                borderRadius: '8px',
                border: 'none',
                background: '#81c784',
                color: 'white',
                cursor: 'pointer',
                fontSize: '18px'
              }}
            >
              +
            </button>
          </div>
          <div style={{ marginTop: '40px', display: 'flex', gap: '12px' }}>
            <Monitor size={24} style={{ color: '#64b5f6' }} />
            <Database size={24} style={{ color: '#81c784' }} />
            <Users size={24} style={{ color: '#ffb74d' }} />
            <Glasses size={24} style={{ color: '#ce93d8' }} />
          </div>
          <p style={{ marginTop: '12px', fontSize: '12px', color: '#888' }}>
            Icons are working! â†‘
          </p>
          
          <div style={{ 
            marginTop: '40px', 
            padding: '20px', 
            background: 'rgba(0,0,0,0.3)',
            borderRadius: '12px',
            maxWidth: '600px'
          }}>
            <h3 style={{ color: '#64b5f6', marginBottom: '12px' }}>Instructions:</h3>
            <ol style={{ lineHeight: '1.8', color: '#ccc', paddingLeft: '20px' }}>
              <li>Download a .jsx file from our chat</li>
              <li>Open this HTML file in a text editor</li>
              <li>Find the section that says "PASTE YOUR COMPONENT CODE BELOW"</li>
              <li>Copy the JSX file contents and paste there</li>
              <li>Remove the <code style={{ background: 'rgba(255,255,255,0.1)', padding: '2px 6px', borderRadius: '4px' }}>import</code> lines at the top</li>
              <li>Change <code style={{ background: 'rgba(255,255,255,0.1)', padding: '2px 6px', borderRadius: '4px' }}>export default function ComponentName</code> to <code style={{ background: 'rgba(255,255,255,0.1)', padding: '2px 6px', borderRadius: '4px' }}>function App</code></li>
              <li>Save and open/refresh in browser!</li>
            </ol>
          </div>
        </div>
      );
    }

    // =====================================================
    // END OF COMPONENT CODE - DON'T MODIFY BELOW
    // =====================================================
    
    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
