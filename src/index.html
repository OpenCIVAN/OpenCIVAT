<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIA Web - Collaborative Immersive Analysis</title>
  <style>
    /* Loading screen styles - blue-tinted dark theme */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      background: #020406;
      color: rgba(255, 255, 255, 0.95);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0c1220 0%, #020406 70%);
      z-index: 9999;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-out;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px;
      background: rgba(8, 14, 24, 0.6);
      border: 1px solid rgba(96, 165, 250, 0.12);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 60px rgba(96, 165, 250, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .loading-logo {
      width: 72px;
      height: 72px;
      margin-bottom: 24px;
      position: relative;
    }

    .loading-logo svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 12px rgba(96, 165, 250, 0.4));
    }

    .loading-logo::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, transparent 70%);
      animation: glow 2s ease-in-out infinite;
    }

    .loading-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .loading-title {
      font-size: 24px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .loading-subtitle {
      font-size: 11px;
      color: rgba(180, 200, 240, 0.6);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .loading-spinner-container {
      position: relative;
      width: 48px;
      height: 48px;
      margin-bottom: 24px;
    }

    .loading-spinner {
      width: 100%;
      height: 100%;
      border: 2px solid rgba(96, 165, 250, 0.1);
      border-radius: 50%;
      position: relative;
    }

    .loading-spinner::before {
      content: '';
      position: absolute;
      inset: -2px;
      border: 2px solid transparent;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-spinner::after {
      content: '';
      position: absolute;
      inset: 4px;
      border: 2px solid transparent;
      border-top-color: rgba(96, 165, 250, 0.4);
      border-radius: 50%;
      animation: spin 1.5s linear infinite reverse;
    }

    .loading-status {
      font-size: 12px;
      color: rgba(180, 200, 240, 0.5);
      text-align: center;
      letter-spacing: 0.5px;
      min-height: 18px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes glow {

      0%,
      100% {
        opacity: 0.6;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-container">
      <div class="loading-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 -960 960 960" fill="#60a5fa">
          <path
            d="M320-280v-23q0-44 44-70.5T480-400q72 0 116 26.5t44 70.5v23H320Zm160-160q-33 0-56.5-23.5T400-520q0-33 23.5-56.5T480-600q33 0 56.5 23.5T560-520q0 33-23.5 56.5T480-440ZM100-605v344q11 19 38.5 33t65.5 22v-363q-32-7-58-16t-46-20Zm760 0q-20 11-46 20t-58 16v363q38-8 65-22t39-33v-344ZM264-133q-111-16-167.5-48T40-261v-424q0-57 111.5-86T480-800q217 0 328.5 29T920-685v424q0 48-56.5 80T696-133v-486q63-11 106.5-26t69.5-35q-49-31-145-46t-247-15q-147 0-243 14.5T86-680q23 20 66 35t112 26v486ZM100-605v399-399Zm760 0v399-399Z" />
        </svg>
      </div>
      <div class="loading-brand">
        <div class="loading-title">CIA Web</div>
        <div class="loading-subtitle">Collaborative Immersive Analysis</div>
      </div>
      <div class="loading-spinner-container">
        <div class="loading-spinner"></div>
      </div>
      <div class="loading-status" id="loading-status">
        Initializing...
      </div>
    </div>
  </div>

  <!-- React will mount here -->
  <div id="react-root"></div>

  <script>
    // Update loading status (called from index.js)
    window.updateLoadingStatus = function (message) {
      const statusEl = document.getElementById('loading-status');
      if (statusEl) {
        statusEl.textContent = message;
      }
    };

    // Hide loading screen (called from React after mount)
    window.hideLoadingScreen = function () {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
      }
    };
  </script>
</body>

</html>
