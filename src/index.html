<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIA Web - Collaborative Immersive Analysis</title>
  <style>
    /* Minimal loading screen styles - inline to avoid external CSS issues */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      overflow: hidden;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      z-index: 9999;
    }

    #loading-screen.hidden {
      display: none;
    }

    .loading-logo {
      font-size: 48px;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }

    .loading-text {
      font-size: 18px;
      color: #4CAF50;
      margin-bottom: 30px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top: 4px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-status {
      margin-top: 20px;
      font-size: 14px;
      color: #999;
      text-align: center;
      max-width: 400px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">🎨</div>
    <div class="loading-text">CIA War Room</div>
    <div class="loading-spinner"></div>
    <div class="loading-status" id="loading-status">
      Initializing...
    </div>
  </div>

  <!-- React will mount here -->
  <div id="react-root"></div>

  <script>
    // Update loading status (called from index.js)
    window.updateLoadingStatus = function (message) {
      const statusEl = document.getElementById('loading-status');
      if (statusEl) {
        statusEl.textContent = message;
      }
    };

    // Hide loading screen (called from React after mount)
    window.hideLoadingScreen = function () {
      const loadingScreen = document.getElementById('loading-screen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
      }
    };
  </script>
</body>

</html>
