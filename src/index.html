<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    /* Panel hide animation */
    #panel {
      transition: max-height 0.3s ease, opacity 0.3s ease;
      overflow: hidden;
    }
    .hidden {
    display: none !important;
    }

    #panel.hidden {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <link rel="stylesheet" href="index.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vtk.js Visualization</title>
</head>
<body>
  <button id="togglePanelBtn"
  style="
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 2000;
      background: #444;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
  ">
      Hide Panel
  </button>

  <h1>vtk.js Visualization</h1>
  <!-- VTK and your controller panel will be injected by Webpack -->

</body>
</html>
