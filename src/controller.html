<div id="panel" style="position: relative;">

  <!-- ⭐ Hide / Show Panel Button (must be INSIDE the panel) -->
  <button id="togglePanelBtn" style="
      position: absolute;
      top: -40px;
      right: 0;
      z-index: 2000;
      padding: 6px 12px;
      background-color: #222;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;">
    Hide Panel
  </button>

  <table>
    <tr><td><button class="vrbutton" style="width:100%">Send To VR</button></td></tr>

    <tr><td>
      <select class="representations" style="width:100%">
        <option value="0">Points</option>
        <option value="1">Wireframe</option>
        <option value="2" selected>Surface</option>
      </select>
    </td></tr>

    <tr><td><input type="file" id="fileInput" style="width:100%"></td></tr>

    <tr><td><hr/></td></tr>

    <tr><td><div style="font-weight:700;opacity:.7">LLM-Assisted Analysis</div></td></tr>

    <tr><td><button id="btn-compute-stats" style="width:100%">Compute Stats</button></td></tr>
    <tr><td><textarea id="stats-json" rows="8" style="width:100%">{}</textarea></td></tr>

    <tr><td><button id="btn-ask-llm" style="width:100%">Analyze with LLM (WebLLM)</button></td></tr>
    <tr><td><textarea id="llm-json" rows="8" style="width:100%">LLM JSON results will appear here…</textarea></td></tr>

    <tr><td>
      <div id="llm-summary"
           style="margin-top:4px;font-size:13px;font-style:italic;line-height:1.3;">
        Summary will appear here…
      </div>
      <!-- Findings Panel -->
      <div id="findings-panel" class="findings-panel">
        <div class="findings-header">Findings</div>
        <div id="findings-list"></div>
      </div>

    </td></tr>

    <tr><td>
      <div style="font-size:12px;opacity:.6;margin-top:6px">
        Tip: Load a .vtp → <i>Compute Stats</i> → <i>Analyze with LLM</i>.
        Highlights will render on the 3D model.
      </div>
    </td></tr>
  </table>

</div>
